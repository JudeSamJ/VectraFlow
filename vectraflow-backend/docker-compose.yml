version: '3.8'

# =============================================================
# AWS CLOUD DEPLOYMENT
#
# All infrastructure is external:
#   PostgreSQL  → AWS RDS
#   Redis       → AWS ElastiCache
#   Storage     → AWS S3
#   Vector DB   → Zilliz Cloud (managed Milvus)
#
# This file runs only the application containers.
# Set all AWS credentials in .env before running.
# =============================================================

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    restart: unless-stopped

  celery_worker:
    build: .
    env_file:
      - .env
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    restart: unless-stopped

  celery_beat:
    build: .
    env_file:
      - .env
    command: ["celery", "-A", "app.celery_app.celery_app", "beat", "--loglevel=info"]
    restart: unless-stopped
